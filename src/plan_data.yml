          kind: leaf
          summary: Request graceful background daemon shutdown.
          positionals: []
          flags:
            - name: --shutdown-timeout-sec
              type: int
              required: false
              default: 30
              description: Maximum time to wait for the daemon to report stopped.
          supported_output_formats: inherited_global_format
          error_format: structured_stderr
        - name: restart
          command_path: "acp-agent-cli daemon restart"
          kind: leaf
          summary: Restart the managed app-server using the selected transport profile.
          positionals: []
          flags:
            - name: --transport
              type: enum
              required: false
              default: local_ipc
              values: [local_ipc, tcp]
              description: Transport exposed after restart.
            - name: --tcp-bind
              type: string
              required: false
              default: 127.0.0.1:0
              description: Loopback bind address used only when --transport tcp.
            - name: --auth-token-env
              type: string
              required: false
              default: ACP_AGENT_CLI_DAEMON_AUTH_TOKEN

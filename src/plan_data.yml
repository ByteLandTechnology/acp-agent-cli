      subcommands:
        - name: run
          command_path: "acp-agent-cli daemon run"
          kind: leaf
          summary: Run the app-server in the foreground for development or supervision.
          positionals: []
          flags:
            - name: --transport
              type: enum
              required: false
              default: local_ipc
              values: [local_ipc, tcp]
              description: Transport exposed by the foreground daemon.
            - name: --tcp-bind
              type: string
              required: false
              default: 127.0.0.1:0
              description: Loopback bind address used only when --transport tcp.
            - name: --auth-token-env
              type: string
              required: false
              default: ACP_AGENT_CLI_DAEMON_AUTH_TOKEN
              description: Environment variable that holds the TCP auth token when --transport tcp.
          supported_output_formats: inherited_global_format
          error_format: structured_stderr
        - name: start
          command_path: "acp-agent-cli daemon start"
          kind: leaf
          summary: Start the managed app-server in the background.
          positionals: []
          flags:
            - name: --transport
              type: enum
              required: false
              default: local_ipc
              values: [local_ipc, tcp]
              description: Transport exposed by the background daemon.
            - name: --tcp-bind
              type: string
              required: false
              default: 127.0.0.1:0
              description: Loopback bind address used only when --transport tcp.
            - name: --auth-token-env
              type: string
              required: false
              default: ACP_AGENT_CLI_DAEMON_AUTH_TOKEN
              description: Environment variable that holds the TCP auth token when --transport tcp.
            - name: --startup-timeout-sec
              type: int
              required: false
              default: 30
              description: Maximum time to wait for the daemon to report running.
          supported_output_formats: inherited_global_format
          error_format: structured_stderr
        - name: stop

          error_format: structured_stderr

        - name: show
          command_path: "acp-agent-cli registry show"
          kind: leaf
          summary: Show detailed information about a specific agent from the registry.
          positionals:
            - name: agent_id
              type: string
              required: true
              description: Agent identifier from the registry.
          flags:
            - name: --version
              type: string
              required: false
              default: latest
              description: Show details for a specific version; defaults to latest.
          shared_flag_sets: [registry_target]
          supported_output_formats: inherited_global_format
          error_format: structured_stderr

        - name: installed
          command_path: "acp-agent-cli registry installed"
          kind: leaf
          summary: Scan and list locally installed ACP agents with version and health status.
          positionals: []
          flags:
            - name: --check-health
              type: bool
              required: false
              default: false
              description: Verify each installed agent is functional by probing its executable.
            - name: --verbose
              type: bool
              required: false
              default: false
              description: Include installation paths, metadata, and configuration details.
          shared_flag_sets: []
          supported_output_formats: inherited_global_format
          error_format: structured_stderr

        - name: install
          command_path: "acp-agent-cli registry install"
          kind: leaf
          summary: Download and install an ACP agent from the registry.
          positionals:
            - name: agent_id
              type: string
              required: true
              description: Agent identifier from the registry to install.
          flags:
            - name: --version
              type: string
              required: false
              default: latest
              description: Specific version to install; defaults to latest.
            - name: --yes
              short: -y
              type: bool
              required: false
              default: false
              description: Skip confirmation prompts and proceed with installation.
            - name: --set-active
              type: bool
              required: false
              default: false
              description: Set the installed agent as the active agent after installation.
          shared_flag_sets: [registry_target]
          supported_output_formats: inherited_global_format
          error_format: structured_stderr

        - name: uninstall
          command_path: "acp-agent-cli registry uninstall"
          kind: leaf
          summary: Remove a locally installed ACP agent.
          positionals:
            - name: agent_id
              type: string
              required: true
              description: Locally installed agent identifier to remove.
          flags:
            - name: --yes
              short: -y
              type: bool
              required: false
              default: false
              description: Skip confirmation prompts and proceed with removal.
            - name: --purge-config
              type: bool
              required: false
              default: false
              description: Also remove agent-specific configuration and data.
          shared_flag_sets: []
          supported_output_formats: inherited_global_format
          error_format: structured_stderr

        - name: update
          command_path: "acp-agent-cli registry update"
          kind: leaf
          summary: Update one or all installed ACP agents to the latest version.
          positionals:
            - name: agent_id
              type: string
              required: false
              default: none
              description: Specific agent to update; omit to update all installed agents.
          flags:
            - name: --version
              type: string
              required: false
              default: latest
              description: Specific version to update to; defaults to latest.
            - name: --check-only
              type: bool
              required: false
              default: false
              description: Check for available updates without installing them.
            - name: --yes
              short: -y
              type: bool
              required: false
              default: false
              description: Skip confirmation prompts and proceed with updates.
          shared_flag_sets: [registry_target]
          supported_output_formats: inherited_global_format
          error_format: structured_stderr

repl_contract:
  status: in_scope
  model: session_console
  requires_active_session: true
  session_resolution: explicit --session wins, otherwise Active Context
  default_input_behavior: plain lines send prompt text to the session
  slash_commands:
    - /prompt
    - /approve
    - /reject
    - /edit
    - /events
    - /files
    - /stop
    - /help
    - /exit
  help_channel: plain_text_only
  exit_triggers:
    - /exit
    - quit
    - EOF
  note: The REPL remains a local client surface even when daemon routing is enabled.


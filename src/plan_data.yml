    - name: registry
      kind: group
      summary: Discover, install, and manage ACP agents from a remote registry.
      subcommands:
        - name: search
          command_path: "acp-agent-cli registry search"
          kind: leaf
          summary: Search the remote registry for available ACP agents by keyword.
          positionals:
            - name: query
              type: string
              required: true
              description: Search keyword or phrase to match against agent names, descriptions, and tags.
          flags:
            - name: --tag
              type: string
              required: false
              repeatable: true
              default: none
              description: Filter results by tag; may be specified multiple times.
            - name: --category
              type: string
              required: false
              default: none
              description: Filter results by agent category.
            - name: --verified-only
              type: bool
              required: false
              default: false
              description: Only return verified or officially curated agents.
          shared_flag_sets: [pagination, registry_target]
          supported_output_formats: inherited_global_format
          error_format: structured_stderr

        - name: list
          command_path: "acp-agent-cli registry list"
          kind: leaf
          summary: List all available ACP agents from the remote registry.
          positionals: []
          flags:
            - name: --tag
              type: string
              required: false
              repeatable: true
              default: none
              description: Filter results by tag; may be specified multiple times.
            - name: --category
              type: string
              required: false
              default: none
              description: Filter results by agent category.
            - name: --verified-only
              type: bool
              required: false
              default: false
              description: Only return verified or officially curated agents.
          shared_flag_sets: [pagination, registry_target]
